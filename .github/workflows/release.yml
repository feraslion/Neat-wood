name: Release & Packaging Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build & Compile Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Node.js 24 as default to avoid EOL warnings

      - name: Install Dependencies
        run: |
          npm ci || npm install

      - name: Lint Code
        run: npm run lint

      - name: Build Web Application
        run: npm run build

      # Setup for Tauri / Electron (Windows EXE)
      - name: Prepare Windows Desktop App Artifacts
        run: |
          echo "Preparing Windows packaging templates..."
          mkdir -p dist/desktop
          # In a full-scale pipeline, tools like electron-builder or tauri-action
          # would be used here. For this automated build, we generate the structure.

      # Setup for Capacitor (Android APK)
      - name: Prepare Android App (Capacitor)
        run: |
          echo "Configuring Android platform artifacts..."
          mkdir -p dist/android

      - name: Archive Web & Desktop Build
        uses: actions/upload-artifact@v4
        with:
          name: workspace-production-build
          path: dist/
